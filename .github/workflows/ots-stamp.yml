name: OTS Auto-Stamp Registry
on: {push: {paths: ['registry/*.json']}}
permissions: {contents: write}
jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install opentimestamps-client
      - run: for f in registry/*.json; do [ -f "$f.ots" ] || ots stamp "$f"; done
      - run: |
          git config user.name ots-bot
          git config user.email ots-bot@users.noreply.github.com
          git add registry/*.ots
          if git diff --staged --quiet; then
            echo "Nothing new to stamp — all registry/*.json already have a .ots."
          else
            git commit -m "[Auto] OTS proofs"
            git push
          fi
